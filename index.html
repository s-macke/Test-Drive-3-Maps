<!DOCTYPE html>
<html>
<head>
    <title>Test Drive III Maps</title>
    <meta charset="utf-8">
    <style>
        :root {
            --accent: #ff8a3d;
            --accent-2: #2dd4bf;
            --panel: rgba(15, 18, 26, 0.72);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f2f4f8;
            --muted: #aab2c0;
        }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        canvas {
            width: 100%;
            height: 100%
        }

        #header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 22px;
            padding: 12px 18px;
            color: var(--text);
            background: linear-gradient(180deg, var(--panel) 0%, rgba(15, 18, 26, 0) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            user-select: none;
        }

        .brand {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            padding-right: 18px;
            border-right: 1px solid var(--border);
        }

        .brand .title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand .subtitle {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .select-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .select-wrap::after {
            content: "";
            position: absolute;
            right: 12px;
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--muted);
            border-bottom: 2px solid var(--muted);
            transform: rotate(45deg) translateY(-2px);
            pointer-events: none;
        }

        #selector {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 34px 8px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        #selector:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #selector:focus {
            outline: none;
            border-color: var(--accent);
        }

        #selector optgroup {
            color: var(--muted);
            background: #1a1e28;
        }

        #selector option {
            color: var(--text);
            background: #1a1e28;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 8px;
            margin-left: auto;
            font-size: 10px;
            color: var(--muted);
        }

        .controls .hint {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        kbd {
            display: inline-block;
            min-width: 7px;
            text-align: center;
            padding: 1px 4px;
            font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-bottom-width: 2px;
            border-radius: 4px;
        }

        .source-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 11px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: border-color 0.15s ease, background 0.15s ease;
        }

        .source-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<header id="header">
    <div class="brand">
        <span class="title">Test Drive III</span>
        <span class="subtitle">The Passion &middot; Map Viewer</span>
    </div>

    <div class="field">
        <label for="selector">Scene</label>
        <div class="select-wrap">
            <select id="selector" name="Mapselector">
                <optgroup label="Pacific Coast">
                    <option value="0">Pacific Course 1</option>
                    <option value="1">Pacific Course 2</option>
                    <option value="2">Pacific Course 3</option>
                    <option value="3">Pacific Course 4</option>
                    <option value="4">Pacific Course 5</option>
                </optgroup>
                <optgroup label="Cape Cod">
                    <option value="5">Cape Cod Course 1</option>
                    <option value="6">Cape Cod Course 2</option>
                    <option value="7">Cape Cod Course 3</option>
                    <option value="8">Cape Cod Course 4</option>
                    <option value="9">Cape Cod Course 5</option>
                </optgroup>
                <optgroup label="Other">
                    <option value="10">Unknown map</option>
                </optgroup>
                <optgroup label="Tiles">
                    <option value="11">Tiles 1</option>
                    <option value="12">Tiles 2</option>
                    <option value="13">Tiles 3</option>
                </optgroup>
                <optgroup label="Objects">
                    <option value="14">Objects 1</option>
                    <option value="15">Objects 2</option>
                </optgroup>
                <optgroup label="Vehicles">
                    <option value="16">Cars</option>
                </optgroup>
            </select>
        </div>
    </div>

    <nav class="controls">
        <span class="hint"><kbd>WASD</kbd> move</span>
        <span class="hint"><kbd>R</kbd><kbd>F</kbd> up/down</span>
        <span class="hint"><kbd>Q</kbd><kbd>E</kbd> roll</span>
        <span class="hint"><kbd>&uarr;&darr;&larr;&rarr;</kbd> look</span>
        <span class="hint"><kbd>Drag</kbd> aim</span>
    </nav>

    <a class="source-link" href="https://github.com/s-macke/Test-Drive-3-Maps"
       target="_blank" rel="noopener" title="View source on GitHub">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" fill="currentColor">

        </svg>
        <span class="source-label">Source</span>
    </a>
</header>

<script type="module" src="/src/browser/main.ts"></script>

</body>
</html>
